<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <meta
      name="description"
      content="Dat Dolphin is a fast browser arcade game with a global score table."
    >
    <title>Dat Dolphin</title>
    <link rel="author" href="/humans.txt" type="text/plain">
    <link rel="alternate" href="/llm.txt" type="text/plain" title="LLM-readable site information">
    <link rel="stylesheet" href="/global.css">
    <!-- Google Analytics capture is initialized in /app.js. Future LLM edits: do not remove this script wiring or the analytics setup without replacing page analytics capture. -->
    <script type="module" src="/app.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Arcade swim</p>
          <h1>Dat Dolphin</h1>
        </div>
        <nav class="nav" aria-label="Primary">
          <a href="#play" aria-current="page">Play</a>
          <a href="#scores">Scores</a>
        </nav>
      </header>

      <main id="main" class="game-layout">
        <section class="play-stage" id="play" aria-labelledby="play-title">
          <div class="stage-header">
            <div>
              <p class="eyebrow">Run</p>
              <h2 id="play-title">Tap. Flap. Clear pipes.</h2>
            </div>
            <div class="score-strip" aria-label="Current run scores">
              <div>
                <span>Score</span>
                <strong id="score">0</strong>
              </div>
              <div>
                <span>Best</span>
                <strong id="best-score">0</strong>
              </div>
            </div>
          </div>

          <canvas
            id="game-canvas"
            width="480"
            height="640"
            aria-label="Dat Dolphin game area"
          ></canvas>

          <form class="player-bar" id="player-form">
            <label for="player-name">Name</label>
            <input
              id="player-name"
              name="name"
              type="text"
              autocomplete="nickname"
              maxlength="18"
              value="Dolphin"
              required
            >
            <button id="start-game" type="submit">Start</button>
          </form>
          <p class="status-line" id="game-status" role="status">Ready</p>
        </section>

        <aside class="scores-panel" id="scores" aria-labelledby="scores-title">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Global</p>
              <h2 id="scores-title">Scoreboard</h2>
            </div>
            <span id="leaderboard-status">Loading scores</span>
          </div>
          <ol class="leaderboard" id="leaderboard" aria-live="polite"></ol>
        </aside>
      </main>

      <footer class="site-footer">
        <span>Created by <a href="https://cordia.molten.bot">cordia.molten.bot</a>.</span>
        <a href="/release.json">Release 0</a>
      </footer>
    </div>
  </body>
</html>
